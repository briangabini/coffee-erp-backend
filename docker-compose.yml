services:
  postgres:
    image: postgres:16-alpine
    container_name: coffee_inventory_db
    environment:
      POSTGRES_USER: coffee_admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: coffee_inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: